<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>&nbsp;</title>
<style>
  /* ============================================================
     v0.2 — media is the whole site. no copy. chaotic/blurry/loopy.
     ============================================================ */
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#000;overflow:hidden;cursor:crosshair;}
  body{position:relative;}

  /* full-bleed cycling background video, blurred + saturated */
  .bg{
    position:fixed; inset:-6vmax; z-index:0;
    width:calc(100% + 12vmax); height:calc(100% + 12vmax);
    object-fit:cover;
    filter:blur(9px) saturate(1.2) contrast(1.02) brightness(.9);
    opacity:0; transition:opacity 1.6s ease;
    transform:scale(1.06);
  }
  .bg.show{opacity:.5;}   /* atmosphere only — foreground video is the star */

  /* drifting layer that holds video tiles + images */
  #field{position:fixed; inset:0; z-index:1;}
  .tile{
    position:absolute; will-change:transform, opacity;
    transition:opacity 1.8s ease, transform .6s cubic-bezier(.22,.61,.36,1);
    cursor:grab; touch-action:none; user-select:none; -webkit-user-select:none;
  }
  .tile.dragging{ cursor:grabbing; }
  .tile.pinned{ cursor:grab; }
  .tile .inner{
    position:absolute; inset:0;
    border-radius:4px; overflow:hidden;
    will-change:transform;
  }
  .tile video, .tile img{
    display:block; width:100%; height:100%; object-fit:cover;
  }
  /* blend modes make everything bleed into everything */
  .tile.vid{ mix-blend-mode:screen; filter:saturate(1.3) contrast(1.1); }
  .tile.img{ mix-blend-mode:multiply; filter:saturate(1.15); }
  .tile.blur{ filter:blur(6px) saturate(1.4); }

  /* ---- native music player: minimal, blended over the media ---- */
  #player{
    position:fixed; left:22px; top:22px;
    z-index:70; display:flex; align-items:center; gap:14px;
    mix-blend-mode:difference; color:#fff;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  #player[hidden]{display:none;}
  #pp{
    appearance:none; -webkit-appearance:none; background:none;
    border:2px solid #fff; color:#fff; width:46px; height:46px;
    border-radius:50%; cursor:pointer; font-size:14px; line-height:1;
    display:flex; align-items:center; justify-content:center; padding-left:2px;
    transition:background .2s ease, color .2s ease;
  }
  #pp:hover{ background:#fff; color:#000; }
  #seek{ width:34vw; max-width:380px; height:3px; background:rgba(255,255,255,.35); position:relative; cursor:pointer; }
  #seekfill{ position:absolute; left:0; top:0; bottom:0; width:0; background:#fff; }
  #ptitle{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; white-space:nowrap; opacity:.85; max-width:20vw; overflow:hidden; text-overflow:ellipsis; }
  /* narrow screens: keep the player compact so it never reaches the bottom-left icons */
  @media (max-width:560px){ #ptitle{ display:none; } #seek{ width:30vw; } }
  /* hidden SoundCloud engine — rendered (so it can play) but off-screen + invisible */
  #sc{ position:fixed; left:-9999px; bottom:0; width:1px; height:1px; border:0; opacity:0; pointer-events:none; }

  /* ---- social links, bottom-left ---- */
  #social{ position:fixed; left:22px; bottom:22px; z-index:60; display:flex; gap:14px; align-items:center; }
  #social a{ width:42px; height:42px; display:block; filter:drop-shadow(0 2px 7px rgba(0,0,0,.55)); transition:transform .18s ease, filter .18s ease; }
  #social a:hover{ transform:scale(1.12); filter:drop-shadow(0 0 11px rgba(255,255,255,.45)); }
  #social svg{ width:100%; height:100%; display:block; fill:currentColor; }
  #social .sp{ color:#1DB954; }  /* Spotify  */
  #social .sc{ color:#FF5500; }  /* SoundCloud */
  #social .am{ color:#FA243C; }  /* Apple Music */

  /* slow looping drifts — several variants so nothing syncs up */
  @keyframes d0{0%{transform:translate(0,0) rotate(0deg);}100%{transform:translate(4vw,-5vh) rotate(6deg);}}
  @keyframes d1{0%{transform:translate(0,0) rotate(0deg);}100%{transform:translate(-5vw,4vh) rotate(-8deg);}}
  @keyframes d2{0%{transform:translate(0,0) scale(1);}100%{transform:translate(3vw,6vh) scale(1.12);}}
  @keyframes d3{0%{transform:translate(0,0) rotate(2deg);}100%{transform:translate(-4vw,-4vh) rotate(-5deg);}}
  @keyframes d4{0%{transform:translate(0,0) scale(1) rotate(-3deg);}100%{transform:translate(6vw,3vh) scale(.9) rotate(4deg);}}
  @keyframes d5{0%{transform:translate(0,0) scale(1.05);}100%{transform:translate(-3vw,-6vh) scale(1);}}
  @keyframes breathe{0%,100%{filter:blur(10px) saturate(1.3);}50%{filter:blur(20px) saturate(1.6);}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;}
    .bg{filter:blur(8px) saturate(1.2);}
  }
</style>
</head>
<body>
  <video class="bg" id="bgA" muted playsinline></video>
  <video class="bg" id="bgB" muted playsinline></video>
  <div id="field"></div>

  <!-- streaming links (bottom-left) -->
  <div id="social">
    <a class="sp" href="https://open.spotify.com/artist/1P8N0GUian1IPtFskYkh2C" target="_blank" rel="noopener noreferrer" aria-label="Listen on Spotify"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg></a>
    <a class="sc" href="https://on.soundcloud.com/huzCf2esuvI0af8JC5" target="_blank" rel="noopener noreferrer" aria-label="Listen on SoundCloud"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.999 14.165c-.052 1.796-1.612 3.169-3.4 3.169h-8.18a.68.68 0 0 1-.675-.683V7.862a.747.747 0 0 1 .452-.724s.75-.513 2.333-.513a5.364 5.364 0 0 1 2.763.755 5.433 5.433 0 0 1 2.57 3.54c.282-.08.574-.121.868-.12.884 0 1.73.358 2.347.992s.948 1.49.922 2.373ZM10.721 8.421c.247 2.98.427 5.697 0 8.672a.264.264 0 0 1-.53 0c-.395-2.946-.22-5.718 0-8.672a.264.264 0 0 1 .53 0ZM9.072 9.448c.285 2.659.37 4.986-.006 7.655a.277.277 0 0 1-.55 0c-.331-2.63-.256-5.02 0-7.655a.277.277 0 0 1 .556 0Zm-1.663-.257c.27 2.726.39 5.171 0 7.904a.266.266 0 0 1-.532 0c-.38-2.69-.257-5.21 0-7.904a.266.266 0 0 1 .532 0Zm-1.647.77a26.108 26.108 0 0 1-.008 7.147.272.272 0 0 1-.542 0 27.955 27.955 0 0 1 0-7.147.275.275 0 0 1 .55 0Zm-1.67 1.769c.421 1.865.228 3.5-.029 5.388a.257.257 0 0 1-.514 0c-.21-1.858-.398-3.549 0-5.389a.272.272 0 0 1 .543 0Zm-1.655-.273c.388 1.897.26 3.508-.01 5.412-.026.28-.514.283-.54 0-.244-1.878-.347-3.54-.01-5.412a.283.283 0 0 1 .56 0Zm-1.668.911c.4 1.268.257 2.292-.026 3.572a.257.257 0 0 1-.514 0c-.241-1.262-.354-2.312-.023-3.572a.283.283 0 0 1 .563 0Z"/></svg></a>
    <a class="am" href="https://music.apple.com/us/artist/j-l-pritchard/1573117825" target="_blank" rel="noopener noreferrer" aria-label="Listen on Apple Music"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.994 6.124a9.23 9.23 0 00-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043a5.022 5.022 0 00-1.877-.726 10.496 10.496 0 00-1.564-.15c-.04-.003-.083-.01-.124-.013H5.986c-.152.01-.303.017-.455.026-.747.043-1.49.123-2.193.4-1.336.53-2.3 1.452-2.865 2.78-.192.448-.292.925-.363 1.408-.056.392-.088.785-.1 1.18 0 .032-.007.062-.01.093v12.223c.01.14.017.283.027.424.05.815.154 1.624.497 2.373.65 1.42 1.738 2.353 3.234 2.801.42.127.856.187 1.293.228.555.053 1.11.06 1.667.06h11.03a12.5 12.5 0 001.57-.1c.822-.106 1.596-.35 2.295-.81a5.046 5.046 0 001.88-2.207c.186-.42.293-.87.37-1.324.113-.675.138-1.358.137-2.04-.002-3.8 0-7.595-.003-11.393zm-6.423 3.99v5.712c0 .417-.058.827-.244 1.206-.29.59-.76.962-1.388 1.14-.35.1-.706.157-1.07.173-.95.045-1.773-.6-1.943-1.536a1.88 1.88 0 011.038-2.022c.323-.16.67-.25 1.018-.324.378-.082.758-.153 1.134-.24.274-.063.457-.23.51-.516a.904.904 0 00.02-.193c0-1.815 0-3.63-.002-5.443a.725.725 0 00-.026-.185c-.04-.15-.15-.243-.304-.234-.16.01-.318.035-.475.066-.76.15-1.52.303-2.28.456l-2.325.47-1.374.278c-.016.003-.032.01-.048.013-.277.077-.377.203-.39.49-.002.042 0 .086 0 .13-.002 2.602 0 5.204-.003 7.805 0 .42-.047.836-.215 1.227-.278.64-.77 1.04-1.434 1.233-.35.1-.71.16-1.075.172-.96.036-1.755-.6-1.92-1.544-.14-.812.23-1.685 1.154-2.075.357-.15.73-.232 1.108-.31.287-.06.575-.116.86-.177.383-.083.583-.323.6-.714v-.15c0-2.96 0-5.922.002-8.882 0-.123.013-.25.042-.37.07-.285.273-.448.546-.518.255-.066.515-.112.774-.165.733-.15 1.466-.296 2.2-.444l2.27-.46c.67-.134 1.34-.27 2.01-.403.22-.043.442-.088.663-.106.31-.025.523.17.554.482.008.073.012.148.012.223.002 1.91.002 3.822 0 5.732z"/></svg></a>
  </div>

  <!-- the site's own minimal player UI (revealed once the station's queue loads) -->
  <div id="player" hidden>
    <button id="pp" aria-label="play / pause">&#9654;</button>
    <div id="seek"><div id="seekfill"></div></div>
    <span id="ptitle"></span>
  </div>

  <!-- hidden SoundCloud engine: loads the profile's tracks; our UI drives it -->
  <iframe id="sc" allow="autoplay" scrolling="no" frameborder="no"
    src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Finnermostthoughts&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"></iframe>
  <script src="https://w.soundcloud.com/player/api.js"></script>

<script>
(async function(){
  const data = await fetch('media/manifest.json').then(r=>r.json());
  const VIDEOS = data.videos, IMAGES = data.images;
  const rand = (a,b)=>a+Math.random()*(b-a);
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

  /* ---- image queue: serve every image before any repeats; never show
         the same one twice on screen at once ---- */
  let imgQueue = shuffle(IMAGES), qi = 0;
  const onScreen = new Set();
  function nextImage(prev){
    if(prev) onScreen.delete(prev);
    let src, tries = 0;
    do {
      if(qi >= imgQueue.length){ imgQueue = shuffle(IMAGES); qi = 0; }
      src = imgQueue[qi++]; tries++;
    } while(onScreen.has(src) && tries <= imgQueue.length);
    onScreen.add(src);
    return src;
  }

  /* ---- video queue: distinct clips across bg + tiles ---- */
  const vidQueue = shuffle(VIDEOS); let vqi = 0;
  const nextVideo = () => vidQueue[(vqi++) % vidQueue.length];

  /* ---- cycling blurred background video (crossfade A/B) ---- */
  const bgA = document.getElementById('bgA'), bgB = document.getElementById('bgB');
  let cur = bgA, nxt = bgB;
  function loadNextBg(){
    nxt.src = nextVideo();
    nxt.play().catch(()=>{});
    nxt.classList.add('show'); cur.classList.remove('show');
    [cur,nxt] = [nxt,cur];
  }
  bgA.src = nextVideo(); bgA.play().catch(()=>{}); bgA.classList.add('show');
  setInterval(loadNextBg, 14000);

  /* ---- scattered floating tiles ---- */
  const field = document.getElementById('field');
  const liveVideos = [bgA, bgB];

  /* ---- dreamy wandering paths: each tile roams its own slow, seamless loop
         (starts & ends at 0,0 so the infinite loop never jumps) ---- */
  const WANDER_N = 16;
  (function buildWander(){
    const sign = ()=> Math.random()<0.5 ? -1 : 1;
    let css = '';
    for(let i=0;i<WANDER_N;i++){
      let frames = '';
      for(const s of [0,20,40,60,80,100]){
        let x=0,y=0,r=0,sc=1;
        if(s!==0 && s!==100){
          x  = (sign()*rand(5,12)).toFixed(1);
          y  = (sign()*rand(5,12)).toFixed(1);
          r  = (sign()*rand(2,7)).toFixed(1);
          sc = rand(0.92,1.1).toFixed(3);
        }
        frames += `${s}%{transform:translate(${x}vw,${y}vh) rotate(${r}deg) scale(${sc});}`;
      }
      css += `@keyframes wander${i}{${frames}}`;
    }
    const st = document.createElement('style'); st.textContent = css; document.head.appendChild(st);
  })();

  function place(t, inner, o){
    o = o || {};
    t.style.width  = rand(o.wMin||15, o.wMax||34) + 'vw';
    t.style.height = rand(o.hMin||13, o.hMax||30) + 'vw';
    t.style.left   = rand(-6,86) + 'vw';
    t.style.top    = rand(-6,84) + 'vh';
    t.style.opacity = rand(.6,.96).toFixed(2);
    const z = Math.floor(rand(1,30));
    t.style.zIndex = z;
    t.dataset.depth = (0.25 + z/30 * 1.05).toFixed(2);   // closer tiles react more
    const dur = rand(55,120).toFixed(1);                 // slow + wide range = varied paces
    const delay = (-rand(0,50)).toFixed(1);              // negative delay desyncs every tile
    inner.style.animation = `wander${(Math.random()*WANDER_N)|0} ${dur}s ease-in-out ${delay}s infinite`;
  }

  /* drag a tile to place + pin it; a click (no drag) fires onClick */
  function enableDrag(t, inner, onClick, onPin){
    let downId=null, sx=0, sy=0, baseL=0, baseT=0, dragging=false;
    t.addEventListener('pointerdown', e=>{
      if(e.button!=null && e.button!==0) return;        // primary / touch only
      downId = e.pointerId; dragging = false;
      const r = t.getBoundingClientRect();
      sx = e.clientX; sy = e.clientY; baseL = r.left; baseT = r.top;
      try{ t.setPointerCapture(downId); }catch(_){}
    });
    t.addEventListener('pointermove', e=>{
      if(downId===null || e.pointerId!==downId) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if(!dragging && Math.hypot(dx,dy) > 5){            // crossed threshold → drag
        dragging = true;
        t.dataset.pinned = '1';                          // excluded from parallax now
        if(onPin) onPin();                               // stop montage / lifespan
        inner.style.animation = 'none';
        t.style.transition = 'none';
        t.style.transform = 'none';
        t.style.width  = t.offsetWidth + 'px';
        t.style.height = t.offsetHeight + 'px';
        t.style.left = baseL + 'px'; t.style.top = baseT + 'px';
        t.style.zIndex = 9999;
        t.classList.add('dragging');
      }
      if(dragging){
        t.style.left = (baseL + dx) + 'px';
        t.style.top  = (baseT + dy) + 'px';
      }
    });
    function end(){
      if(downId===null) return;
      try{ t.releasePointerCapture(downId); }catch(_){}
      if(!dragging){ if(onClick) onClick(); }            // it was a click → flip
      else { t.classList.remove('dragging'); t.classList.add('pinned'); }
      downId = null;
    }
    t.addEventListener('pointerup', end);
    t.addEventListener('pointercancel', end);
  }

  function spawnVideoTile(){
    const t = document.createElement('div');
    t.className = 'tile vid';                                // never blurred — sharp
    const inner = document.createElement('div'); inner.className = 'inner';
    t.appendChild(inner);
    place(t, inner, {wMin:16, wMax:31, hMin:14, hMax:27});  // image-sized, present
    const z = Math.floor(rand(22,40));                      // sit forward of images
    t.style.zIndex = z; t.dataset.depth = (0.5 + z/40 * 0.9).toFixed(2);
    t.style.opacity = '1';                                  // full strength
    const target = t.style.opacity;     // intended opacity (place set it)
    t.style.opacity = '0';              // start invisible, fade in
    const v = document.createElement('video');
    v.src = nextVideo(); v.muted = true; v.loop = true;
    v.playsInline = true; v.autoplay = true;
    v.addEventListener('canplay', ()=>v.play().catch(()=>{}));
    liveVideos.push(v); inner.appendChild(v); field.appendChild(t);
    requestAnimationFrame(()=>{ t.style.opacity = target; });

    // lifespan: play a while, fade out, remove, then a new clip appears elsewhere.
    // a pinned (dragged) tile cancels this so it stays where you left it.
    const retire = setTimeout(()=>{
      t.style.opacity = '0';
      setTimeout(()=>{
        const i = liveVideos.indexOf(v); if(i>-1) liveVideos.splice(i,1);
        try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(e){}
        t.remove();
        spawnVideoTile();              // keep the count constant, new spot + clip
      }, 1900);
    }, rand(28000, 48000));

    enableDrag(t, inner, null, ()=>clearTimeout(retire));  // draggable; click does nothing for video
  }

  function makeImageTile(){
    const t = document.createElement('div');
    t.className = 'tile img' + (Math.random()<0.3?' blur':'');
    const inner = document.createElement('div'); inner.className = 'inner';
    t.appendChild(inner);
    place(t, inner);
    const img = new Image();
    img.style.transition = 'opacity 1.2s ease';
    img.dataset.cur = nextImage(null);
    img.src = img.dataset.cur;
    inner.appendChild(img); field.appendChild(t);

    // fade to the next image; `relocate` is skipped once a tile is pinned
    function showNext(relocate){
      img.style.opacity = '0';
      setTimeout(()=>{
        const nx = nextImage(img.dataset.cur);
        img.dataset.cur = nx;
        img.onload = ()=>{ img.style.opacity = '1'; };
        img.src = nx;
        if(relocate && !t.dataset.pinned) place(t, inner);
      }, 1200);
    }

    // montage: staggered, slow auto-swap-with-relocate
    const period = rand(16000, 30000);
    let kickoff = setTimeout(()=>{ showNext(true); t._montage = setInterval(()=>showNext(true), period); }, rand(0, period));

    // drag to place + pin; click (no drag) flips to the next image in place
    enableDrag(
      t, inner,
      ()=> showNext(false),                                   // onClick: flip, stay put
      ()=>{ clearTimeout(kickoff); clearInterval(t._montage); } // onPin: stop autonomous motion
    );
  }

  for(let i=0;i<3;i++)  spawnVideoTile();  // decoder limit keeps this small
  for(let i=0;i<18;i++) makeImageTile();   // images carry the montage

  /* ---- pointer / touch: parallax drift + gentle repel near the cursor ---- */
  (function interact(){
    let mx = innerWidth/2, my = innerHeight/2, raf = 0;
    const PAR = 70;     // max parallax shift (px) at full depth
    const R   = 340;    // repel radius (px)
    const PUSH= 180;    // max repel strength (px)
    function apply(){
      raf = 0;
      const vw = innerWidth, vh = innerHeight;
      for(const t of field.children){
        if(t.dataset.pinned) continue;     // dropped tiles stay exactly where left
        const depth = +t.dataset.depth || 0.5;
        let ox = (mx - vw/2)/vw * depth * PAR;
        let oy = (my - vh/2)/vh * depth * PAR;
        // repel uses the tile's untransformed layout center (stable, no feedback)
        const cx = t.offsetLeft + t.offsetWidth/2;
        const cy = t.offsetTop  + t.offsetHeight/2;
        const dx = cx - mx, dy = cy - my, dist = Math.hypot(dx,dy);
        if(dist < R){ const f = (1 - dist/R); const p = f*f*PUSH; const inv = 1/(dist||1); ox += dx*inv*p; oy += dy*inv*p; }
        t.style.transform = `translate3d(${ox.toFixed(1)}px, ${oy.toFixed(1)}px, 0)`;
      }
    }
    function schedule(){ if(!raf) raf = requestAnimationFrame(apply); }
    addEventListener('pointermove', e=>{ mx = e.clientX; my = e.clientY; schedule(); }, {passive:true});
    // ease everything back to rest when the pointer leaves the window
    addEventListener('pointerleave', ()=>{ mx = innerWidth/2; my = innerHeight/2; schedule(); });
  })();

  /* ---- perpetual radio: a hidden SoundCloud widget wearing the site's own
         minimal UI. shuffles the profile's tracks, and the first play "tunes in"
         mid-broadcast (random track, random offset) so the station feels like it
         was already on the air before you arrived. loops forever. ---- */
  (function radio(){
    if(!window.SC || !SC.Widget) return;   // widget api failed to load → stay hidden
    const el    = document.getElementById('player');
    const pp    = document.getElementById('pp');
    const seek  = document.getElementById('seek');
    const fill  = document.getElementById('seekfill');
    const title = document.getElementById('ptitle');
    const PLAY = '▶', PAUSE = '❚❚';
    const w = SC.Widget(document.getElementById('sc'));
    const E = SC.Widget.Events;
    let order = [], idx = 0, ready = false, tunedIn = false, pendingTune = false;

    const showTitle = ()=> w.getCurrentSound(s=>{
      if(!s) return;
      const y = (''+(s.release_year || s.display_date || s.created_at || '')).match(/\d{4}/);
      title.textContent = y ? `${s.title} (${y[0]})` : s.title;
    });
    const playAt = i => { if(order.length){ idx = (i+order.length)%order.length; w.skip(order[idx]); } };

    w.bind(E.READY, ()=> w.getSounds(sounds=>{
      order = shuffle(sounds.map((_,i)=>i));   // our own shuffled running order
      ready = true;
      el.hidden = false;                        // reveal controls now there's a queue
    }));
    w.bind(E.PLAY_PROGRESS, e=>{ fill.style.width = (e.relativePosition*100)+'%'; });
    w.bind(E.PLAY, ()=>{
      pp.textContent = PAUSE; showTitle();
      if(pendingTune){ pendingTune = false; w.getDuration(d=>{ if(d) w.seekTo(Math.random()*d*0.9); }); }
    });
    w.bind(E.PAUSE,  ()=>{ pp.textContent = PLAY; });
    w.bind(E.FINISH, ()=> playAt(idx+1));      // roll to the next track in our order

    pp.addEventListener('click', ()=>{
      if(!ready) return;
      if(!tunedIn){ tunedIn = true; pendingTune = true; w.skip(order[0]); w.play(); return; }
      w.isPaused(p => p ? w.play() : w.pause());
    });
    seek.addEventListener('click', e=>{
      const r = seek.getBoundingClientRect();
      w.getDuration(d=>{ if(d) w.seekTo((e.clientX-r.left)/r.width * d); });
    });
  })();

  // robustness: retry autoplay on any gesture / when tab regains focus
  function kick(){ liveVideos.forEach(v=>v.play().catch(()=>{})); }
  ['pointerdown','keydown','touchstart'].forEach(e=>window.addEventListener(e,kick,{passive:true}));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) kick(); });
})();
</script>
</body>
</html>
